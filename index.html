<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Airport Finder by Clawz</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanline"></div>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="img/logo.png" alt="Clawz logo" class="brand-logo" onerror="this.style.display='none'" />
        <div class="brand-divider"></div>
        <div>
          <h1>AIRPORT FINDER</h1>
          <p>by Clawz</p>
        </div>
      </div>
      <div class="version-pill">v2.1.0</div>
    </header>

    <section class="search-section">
      <label for="search">SEARCH AIRPORT</label>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input id="search" type="search" placeholder="IATA / ICAO / Airport / City" autocomplete="off" spellcheck="false" />
      </div>
      <div id="recent-searches" class="recent-searches" aria-live="polite" hidden></div>
    </section>

    <section id="status" class="status">Loading OpenFlights airport database...</section>
    <section id="result" class="result-card empty-card">
      <div class="empty-message">
        <div class="empty-icon">✈</div>
        <h2>Airport information appears here</h2>
        <p>Search by IATA, ICAO, airport name or city.</p>
      </div>
    </section>

    <footer class="footer-card">
      <img src="img/logo.png" alt="Clawz logo" onerror="this.style.display='none'" />
      <div>
        <strong>Airport Finder by Clawz</strong>
        <span>Fast. Accurate. Aviation.</span>
      </div>
      <span class="footer-version">Release 2.1.0</span>
    </footer>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
